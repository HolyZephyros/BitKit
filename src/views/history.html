<!-- --- History Page --- -->
<div class="page" id="page-history">
  <div style="display:flex;justify-content:flex-end;margin-bottom:var(--space-sm)">
    <button class="btn btn-primary" id="btnClearHistory">
      <svg fill="none" height="16" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" width="16"><polyline points="3,6 5,6 21,6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      <span data-i18n="history.clear">Temizle</span>
    </button>
  </div>
  <div id="historyList">
    <div class="empty-state">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12,6 12,12 16,14"></polyline></svg>
      <div class="empty-state-title" data-i18n="history.emptyTitle">Henüz geçmiş yok</div>
      <div class="empty-state-text" data-i18n="history.emptyDesc">İndirdiğin dosyalar burada listelenecek.</div>
    </div>
  </div>
</div>
